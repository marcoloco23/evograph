services:
  - type: web
    name: evograph-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: evograph-db
          property: connectionString
      - key: CORS_ORIGINS
        value: '["https://web-theta-rust-21.vercel.app"]'
      - key: LOG_FORMAT
        value: json
      - key: LOG_LEVEL
        value: info

databases:
  - name: evograph-db
    plan: free
    databaseName: evograph
    postgresMajorVersion: "16"
    ipAllowList: []
